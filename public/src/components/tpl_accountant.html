<template id="tmpl-dashboard">
    <div class="acc-wrapper container-fluid p-0 pb-5 mb-5 bg-light">
        <div class="acc-header bg-white d-flex justify-content-between align-items-center px-3 py-3 shadow-sm mb-3">
            <div class="d-flex align-items-center">
                <div class="bg-primary bg-opacity-10 p-2 rounded-circle me-2 d-flex">
                    <i class="fas fa-wallet text-primary fs-5"></i>
                </div>
                <h5 class="m-0 fw-bold text-dark">Kế Toán</h5>
            </div>

            <div class="acc-entity-selector shadow-sm rounded-pill overflow-hidden border border-primary border-opacity-25">
                <select id="acc-entity-select" class="form-select form-select-sm fw-bold border-0 bg-white text-primary px-3 py-1 cursor-pointer">
                    <option value="9trip">🏢 9 Trip ERP</option>
                    <option value="thenice">🏨 The Nice Hotel</option>
                </select>
            </div>
        </div>

        <div class="px-3 mb-4">
            <div class="row g-3">
                <div class="col-12 col-md-6 col-xl-5">
                    <div class="card border-0 shadow-sm rounded-4 h-100 overflow-hidden">
                        <div class="card-header bg-primary bg-gradient text-white d-flex justify-content-between align-items-center p-3 border-0">
                            <span class="text-uppercase small fw-bold tracking-wide"><i class="fas fa-landmark me-2"></i>Tổng Quỹ Thực Tế</span>
                            <span class="fs-4 fw-bolder" id="d-total-fund">0</span>
                        </div>
                        <div class="card-body p-0 bg-white">
                            <div id="acc-fund-list-container" class="acc-fund-list p-2 custom-scrollbar" style="max-height: 200px; overflow-y: auto">
                                <div class="text-center text-muted small fst-italic py-4"><i class="fas fa-spinner fa-spin me-1"></i> Đang tải dữ liệu quỹ...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-xl-7">
                    <div class="card border-0 shadow-sm rounded-4 h-100 overflow-hidden">
                        <div class="card-header bg-success bg-gradient text-white d-flex justify-content-between align-items-center p-3 border-0">
                            <span class="text-uppercase small fw-bold tracking-wide"><i class="fas fa-chart-line me-2"></i>Lãi/Lỗ (Net)</span>
                            <span class="fs-4 fw-bolder text-white" id="d-net-balance">0</span>
                        </div>
                        <div class="card-body p-3 bg-white d-flex flex-column justify-content-center">
                            <div class="row text-center g-3">
                                <div class="col-6">
                                    <div class="p-3 bg-success bg-opacity-10 rounded-4 h-100 border border-success border-opacity-25 transition-hover">
                                        <div class="small text-muted mb-1 text-uppercase fw-semibold"><i class="fas fa-arrow-down text-success me-1"></i> Tổng Thu (IN)</div>
                                        <div class="fs-5 fw-bold text-success text-truncate" id="d-total-in">0</div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="p-3 bg-danger bg-opacity-10 rounded-4 h-100 border border-danger border-opacity-25 transition-hover">
                                        <div class="small text-muted mb-1 text-uppercase fw-semibold"><i class="fas fa-arrow-up text-danger me-1"></i> Tổng Chi (OUT)</div>
                                        <div class="fs-5 fw-bold text-danger text-truncate" id="d-total-out">0</div>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-2 text-end">
                                <small class="text-muted fst-italic" style="font-size: 0.7rem"><i class="fas fa-info-circle me-1"></i>*Chỉ số tính theo bộ lọc bên dưới</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-3 mb-4">
            <div class="acc-filter-container bg-white rounded-4 shadow-sm border border-light overflow-hidden">
                <div class="acc-filter-header bg-light d-flex justify-content-between p-3 border-bottom cursor-pointer transition-hover" onclick="this.parentElement.classList.toggle('active')">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-filter text-primary me-2"></i>
                        <span class="fw-bold text-dark me-2">Bộ Lọc Dữ Liệu:</span>
                        <span id="acc-filter-summary" class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 rounded-pill px-3">Tháng này</span>
                    </div>
                    <i class="fas fa-chevron-down text-muted transition-icon"></i>
                </div>

                <div class="acc-filter-body p-3 bg-white collapse show">
                    <div class="row g-3">
                        <div class="col-12 col-md-7 col-lg-8">
                            <label class="acc-label fw-bold small text-muted mb-2">📅 Giai đoạn</label>
                            <div class="row g-2 align-items-center">
                                <div class="col-12 col-sm-4">
                                    <select id="acc-filter-period" class="form-select form-select-sm fw-bold">
                                        <option value="today">Hôm nay</option>
                                        <option value="week">Tuần này</option>
                                        <option value="month" selected>Tháng này</option>
                                        <option value="last_month">Tháng trước</option>
                                        <option value="quarter">Quý này</option>
                                        <option value="year">Năm nay</option>
                                        <option value="all">Tất cả</option>
                                        <option value="custom">Tùy chọn...</option>
                                    </select>
                                </div>
                                <div class="col-12 col-sm-8" id="acc-custom-date-row">
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-light border-end-0">Từ</span>
                                        <input type="date" id="acc-filter-start" class="form-control border-start-0 ps-1" readonly />
                                        <span class="input-group-text bg-light border-end-0 border-start-0">Đến</span>
                                        <input type="date" id="acc-filter-end" class="form-control border-start-0 ps-1" readonly />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12 col-md-5 col-lg-4">
                            <label class="acc-label fw-bold small text-muted mb-2">🔍 Tìm chi tiết</label>
                            <div class="input-group input-group-sm">
                                <select id="acc-filter-field" class="form-select border-secondary text-dark" style="max-width: 100px">
                                    <option value="all">Tất cả</option>
                                </select>
                                <input type="text" id="acc-filter-value" class="form-control border-secondary" placeholder="Nhập từ khóa..." />
                            </div>
                        </div>
                    </div>

                    <div class="text-end mt-3 border-top pt-3">
                        <button class="btn btn-sm btn-primary px-4 fw-bold shadow-sm rounded-pill" id="btn-apply-filter"><i class="fas fa-check me-1"></i> Áp Dụng Lọc</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-3">
            <div class="table-responsive bg-white rounded-4 shadow-sm border border-light acc-table-wrapper" style="font-size: 0.8rem">
                <table class="table table-hover align-middle mb-0 text-nowrap" id="acc-transaction-table">
                    <thead class="table-light sticky-top shadow-sm text-muted">
                        <tr>
                            <th width="90px" class="ps-3"><i class="fas fa-barcode me-1"></i>ID GD</th>
                            <th width="70px" class="text-center">Loại</th>
                            <th width="95px" class="text-center">Ngày CT</th>
                            <th class="text-end">Số tiền</th>
                            <th style="min-width: 180px">Diễn giải</th>
                            <th width="120px">Hạng mục</th>
                            <th width="110px">Booking ID</th>
                            <th width="80px">Quỹ</th>
                            <th width="110px">Trạng thái</th>
                            <th width="100px">Người tạo</th>
                            <th width="95px">Ngày tạo</th>
                            <th width="40px"></th>
                        </tr>
                    </thead>
                    <tbody id="acc-table-body" class="border-top-0"></tbody>
                </table>
            </div>
            <div class="text-center mt-3 text-muted small pb-4">Đang hiển thị <span id="acc-showing-count" class="fw-bold text-primary">0</span> giao dịch</div>
        </div>

        <div class="d-none">
            <select id="tpl-fund-select-options"></select>
        </div>
    </div>
</template>

<template id="tmpl-acc-footer-bar">
    <div class="acc-action-bar position-fixed bottom-0 start-0 w-100 border-top shadow-lg py-2 px-3 d-flex justify-content-between align-items-center" id="acc-footer-bar" style="z-index: 1040; transition: all 0.3s ease">
        <div class="acc-global-search-wrapper position-relative flex-grow-1 me-3" style="max-width: 350px">
            <i class="fas fa-search text-muted position-absolute top-50 start-0 translate-middle-y ms-3"></i>
            <input type="text" id="acc-global-search" class="form-control form-control-sm ps-5 bg-light border-0 text-truncate rounded-pill shadow-sm" placeholder="Tìm ID, Số tiền, Diễn giải trên trang..." />
        </div>

        <div class="d-flex gap-2 align-items-center">
            <button class="btn btn-light text-primary btn-icon-only rounded-circle shadow-sm border border-light" id="acc-btn-sync-sales" title="Làm mới dữ liệu" onclick="window.AccountantCtrl?.init()">
                <i class="fas fa-sync-alt"></i>
            </button>

            <button class="btn btn-light text-secondary btn-icon-only rounded-circle shadow-sm border border-light" id="acc-btn-report" title="Xem báo cáo tổng hợp" onclick="window.AccountantCtrl?.openReportModal()">
                <i class="fas fa-file-invoice"></i>
            </button>

            <div class="btn-group dropup ms-1">
                <button type="button" class="btn btn-primary rounded-pill px-3 fw-bold shadow-sm d-flex align-items-center gap-1" data-bs-toggle="dropdown" aria-expanded="false"><i class="fas fa-plus"></i> <span class="d-none d-sm-inline ms-1">Tạo Phiếu</span></button>
                <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 p-2 rounded-4 mb-3" style="min-width: 220px">
                    <li class="mb-1">
                        <button class="dropdown-item rounded-3 py-2 fw-bold d-flex align-items-center dropdown-item-hover-success" id="acc-btn-add-in" onclick="window.AccountantCtrl.openTransactionModal('IN')">
                            <div class="bg-success bg-opacity-10 p-2 rounded-circle me-3 d-flex">
                                <i class="fas fa-arrow-down text-success"></i>
                            </div>
                            <div class="d-flex flex-column">
                                <span class="text-success">Phiếu Thu (IN)</span>
                                <span class="small text-muted fw-normal" style="font-size: 0.7rem">Ghi nhận tiền vào quỹ</span>
                            </div>
                        </button>
                    </li>
                    <li>
                        <button class="dropdown-item rounded-3 py-2 fw-bold d-flex align-items-center dropdown-item-hover-danger" id="acc-btn-add-out" onclick="window.AccountantCtrl.openTransactionModal('OUT')">
                            <div class="bg-danger bg-opacity-10 p-2 rounded-circle me-3 d-flex">
                                <i class="fas fa-arrow-up text-danger"></i>
                            </div>
                            <div class="d-flex flex-column">
                                <span class="text-danger">Phiếu Chi (OUT)</span>
                                <span class="small text-muted fw-normal" style="font-size: 0.7rem">Ghi nhận xuất tiền</span>
                            </div>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</template>
<template id="tmpl-report">
    <!-- Report Modal Content -->
    <div class="acc-report-wrapper container-fluid p-0">
        <div class="acc-report-header d-flex justify-content-between align-items-center px-3 py-2 shadow-sm border-bottom">
            <div class="d-flex align-items-center">
                <i class="fas fa-file-invoice text-success fs-4 me-2"></i>
                <h5 class="m-0 fw-bold text-dark">Báo Cáo Giao Dịch</h5>
            </div>
            <select id="report-type-select" class="form-select form-select-sm fw-bold border-0 bg-light" style="max-width: 200px">
                <option value="all">📊 Tất cả giao dịch</option>
                <option value="in">📥 Phiếu Thu (IN)</option>
                <option value="out">📤 Phiếu Chi (OUT)</option>
                <option value="summary">📈 Tổng hợp</option>
            </select>
        </div>

        <div class="px-3 py-2 bg-light">
            <div class="acc-filter-container" style="width: fit-content">
                <div class="acc-filter-header border rounded" onclick="this.parentElement.classList.toggle('active')" style="pointer-events: auto">
                    <div class="d-flex align-items-center px-2 py-2">
                        <i class="fas fa-filter text-success me-2"></i>
                        <span class="fw-bold text-dark me-1">Bộ lọc:</span>
                        <span id="report-filter-summary" class="text-success fw-bold small">Tháng này</span>
                    </div>
                    <i class="fas fa-chevron-down text-muted transition-icon"></i>
                </div>

                <div class="acc-filter-body border border-top-0 rounded-bottom p-3">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="acc-label">Giai đoạn</label>
                            <select id="report-filter-period" class="form-select form-select-sm">
                                <option value="today">Hôm nay</option>
                                <option value="week">Tuần này</option>
                                <option value="month" selected>Tháng này</option>
                                <option value="quarter">Quý này</option>
                                <option value="year">Năm nay</option>
                                <option value="all">Tất cả</option>
                                <option value="custom">Tùy chọn ngày...</option>
                            </select>
                        </div>
                        <div class="col-md-6" id="report-custom-date-row" style="display: none">
                            <div class="row g-2">
                                <div class="col-6">
                                    <label class="acc-label-xs">Từ ngày</label>
                                    <input type="date" id="report-filter-start" class="form-control form-control-sm" />
                                </div>
                                <div class="col-6">
                                    <label class="acc-label-xs">Đến ngày</label>
                                    <input type="date" id="report-filter-end" class="form-control form-control-sm" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mt-2">
                        <div class="col-md-6">
                            <label class="acc-label">Tìm kiếm</label>
                            <input type="text" id="report-filter-keyword" class="form-control form-control-sm" placeholder="ID, Diễn giải, Booking ID..." />
                        </div>
                        <div class="col-md-6">
                            <label class="acc-label">Lọc theo Quỹ</label>
                            <select id="report-filter-fund" class="form-select form-select-sm">
                                <option value="">Tất cả quỹ</option>
                            </select>
                        </div>
                    </div>

                    <div class="text-end mt-3">
                        <button class="btn btn-sm btn-success" id="btn-apply-report-filter"><i class="fas fa-check me-1"></i> Áp dụng</button>
                        <button class="btn btn-sm btn-outline-secondary" id="btn-reset-report-filter"><i class="fas fa-redo me-1"></i> Làm mới</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-3 pb-5" style="max-height: 70vh; overflow-y: auto">
            <table class="table table-striped table-hover align-middle mt-3 text-nowrap" id="report-transaction-table" style="font-size: 0.85rem">
                <thead class="table-light sticky-top">
                    <tr>
                        <th width="80px"><i class="fas fa-barcode me-1"></i>ID GD</th>
                        <th width="60px" class="text-center">Loại</th>
                        <th width="90px" class="text-center">Ngày Giao Dịch</th>
                        <th width="90px" class="text-center">Ngày Tạo</th>
                        <th class="text-end">Số Tiền</th>
                        <th style="min-width: 160px">Diễn Giải</th>
                        <th width="100px">Hạng Mục</th>
                        <th width="85px">Booking ID</th>
                        <th width="75px">Quỹ</th>
                        <th width="90px">Trạng Thái</th>
                        <th width="85px">Người Tạo</th>
                        <th width="50px"></th>
                    </tr>
                </thead>
                <tbody id="report-table-body">
                    <tr>
                        <td colspan="12" class="text-center text-muted py-4"><i class="fas fa-spinner fa-spin me-2"></i> Đang tải dữ liệu...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="px-3 py-2 bg-light border-top text-muted small text-center">Tổng: <span id="report-total-records" class="fw-bold text-dark">0</span> giao dịch | Thu: <span id="report-total-in" class="fw-bold text-success">0</span> | Chi: <span id="report-total-out" class="fw-bold text-danger">0</span> | Lệch: <span id="report-balance" class="fw-bold">0</span></div>
    </div>
</template>
