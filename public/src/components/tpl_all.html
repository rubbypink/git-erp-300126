    <div id="tab-admin-router" class="container-fluid admin-wrapper pb-5">
        <div class="admin-header-text">
            <h2 class="fw-bold"><i class="fas fa-user-shield me-2"></i>TRUNG TÂM QUẢN TRỊ (ADMIN)</h2>
            <p class="text-muted">Xin chào, vui lòng chọn phân hệ làm việc</p>
        </div>

        <div class="container mb-4">
            <div class="row g-4 justify-content-center">
                <div class="col-md-4 col-sm-12">
                    <div class="card p-5 text-center module-card card-sales" onclick="B.reloadSystemMode('sale')">

                    </div>
                </div>

                <div class="col-md-4 col-sm-12">
                    <div class="card p-5 text-center module-card card-op" onclick="B.reloadSystemMode('op')">
                        <div class="module-icon text-success">
                            <i class="fas fa-map-marked-alt"></i>
                        </div>
                        <h3 class="module-title text-success">Operator Center</h3>
                        <p class="text-muted small">Điều phối Tour, Xe & Hướng dẫn viên</p>
                    </div>
                </div>

                <div class="col-md-4 col-sm-12">
                    <div class="card p-5 text-center module-card card-acc" onclick="B.reloadSystemMode('acc')">
                        <div class="module-icon text-warning">
                            <i class="fas fa-file-invoice-dollar"></i>
                        </div>
                        <h3 class="module-title text-warning">Accounting</h3>
                        <p class="text-muted small">Quản lý Thu chi, Công nợ & Lợi nhuận</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="container mt-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="fas fa-terminal me-2"></i>System Execute Console</h5>
                    <span class="badge bg-success">Async/Await Supported</span>
                </div>
                <div class="card-body bkg-light">
                    <div class="form-group mb-3">
                        <label for="admin-run-input" class="form-label fw-bold">Javascript Code (Thực thi trực tiếp):</label>
                        <textarea id="admin-run-input" class="form-control font-monospace text-primary" rows="6" placeholder="Ví dụ 1 dòng: Object.values(APP_DATA.lists)&#10;Ví dụ nhiều dòng:&#10;let data = await API.get('users');&#10;return data;"></textarea>
                        <small class="text-muted mt-1 d-block"><i class="fas fa-info-circle me-1"></i>Mẹo: Lệnh 1 dòng sẽ tự động 'return'. Nếu viết nhiều dòng có khai báo biến, hãy dùng từ khóa <b>return</b> ở cuối để hiển thị kết quả.</small>
                    </div>

                    <div class="mb-3 text-end">
                        <button
                            type="button"
                            class="btn btn-danger px-4 shadow-sm"
                            onclick="
                                (async () => {
                                    const outputEl = document.getElementById('admin-run-output');
                                    try {
                                        const inputVal = document.getElementById('admin-run-input').value.trim();
                                        if (!inputVal) return;

                                        // 1. Cập nhật UI trạng thái Loading
                                        outputEl.innerHTML = '<span class=\'text-primary\'><i class=\'fas fa-circle-notch fa-spin me-2\'></i>Hệ thống đang thực thi mã...</span>';

                                        // 2. Tiền xử lý mã nguồn (Tự động thêm return nếu là lệnh 1 dòng và không phải khai báo biến)
                                        let codeToRun = inputVal;
                                        const isSingleLine = codeToRun.split('\n').length === 1;
                                        const hasVarDeclaration = codeToRun.startsWith('let ') || codeToRun.startsWith('const ') || codeToRun.startsWith('var ');
                                        if (isSingleLine && !codeToRun.includes('return ') && !hasVarDeclaration) {
                                            codeToRun = 'return ' + codeToRun;
                                        }

                                        // 3. Khởi tạo AsyncFunction (Native Javascript API) để biên dịch Text thành Hàm Async
                                        const AsyncFunction = Object.getPrototypeOf(async function () {}).constructor;
                                        const executeScript = new AsyncFunction(codeToRun);

                                        // 4. Thực thi hàm và chờ kết quả (Xử lý mượt mà cả hàm đồng bộ lẫn Promise)
                                        const rawData = await executeScript();

                                        // 5. Kết xuất ra màn hình (Sử dụng hàm Render Tree-view ở bước trước)
                                        outputEl.innerHTML = SYS.renderConsoleLog(rawData);
                                    } catch (e) {
                                        // Bắt lỗi cú pháp (SyntaxError) hoặc lỗi thực thi (ReferenceError, TypeError...)
                                        outputEl.innerHTML = '<span class=\'text-danger fw-bold\'><i class=\'fas fa-exclamation-triangle me-2\'></i>Lỗi thực thi: ' + e.message + '</span>';
                                        console.error('Console Execution Error:', e);
                                    }
                                })()
                            "
                        >
                            <i class="fas fa-bolt me-2"></i>Execute Code
                        </button>
                    </div>

                    <div class="form-group w-100">
                        <label class="form-label fw-bold">Kết quả hiển thị (Tree View):</label>
                        <div id="admin-run-output" class="p-3 bg-dark border rounded font-monospace shadow-inner" style="min-height: 150px; overflow-x: auto">
                            <span class="text-secondary fst-italic">Waiting for execution...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
