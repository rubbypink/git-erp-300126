<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9 Trip ERP - Admin Manager</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS Frameworks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- Custom Admin Styles -->
    <link rel="stylesheet" href="./css/admin_style.css">
</head>

<body>
    <div id="admin-wrapper">
        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <a href="#" class="sidebar-brand">
                    <i class="fa-solid fa-shield-halved me-2 text-primary"></i>
                    <span>9Trip Admin</span>
                </a>
            </div>

            <div class="flex-grow-1 overflow-auto py-3">
                <div id="admin-menu">
                    <!-- Menu items will be injected here by admin_app.js -->
                </div>
            </div>

            <div class="sidebar-footer p-3 border-top border-secondary border-opacity-25">
                <div class="d-flex align-items-center">
                    <div class="flex-shrink-0">
                        <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white" style="width: 32px; height: 32px;">
                            <i class="fa-solid fa-user-tie"></i>
                        </div>
                    </div>
                    <div class="flex-grow-1 ms-2 overflow-hidden">
                        <div class="fw-bold text-truncate" id="admin-user-name">Admin</div>
                        <div class="small text-muted text-truncate">System Manager</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Header -->
            <header id="admin-header">
                <div class="header-left">
                    <button class="btn btn-light border-0" id="sidebar-toggle">
                        <i class="fa-solid fa-bars-staggered"></i>
                    </button>

                    <nav aria-label="breadcrumb" class="d-none d-md-block">
                        <ol class="breadcrumb mb-0" id="admin-breadcrumb">
                            <li class="breadcrumb-item"><a href="#" class="text-decoration-none">Admin</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Dashboard</li>
                        </ol>
                    </nav>
                </div>

                <div class="header-right d-flex align-items-center gap-3">
                    <!-- Notifications -->
                    <div class="dropdown">
                        <button class="btn btn-light border-0 position-relative rounded-circle" type="button" data-bs-toggle="dropdown">
                            <i class="fa-regular fa-bell"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem;">
                                3+
                            </span>
                        </button>
                        <div class="dropdown-menu dropdown-menu-end shadow border-0 p-0" style="width: 300px;">
                            <div class="p-3 border-bottom fw-bold">Thông báo</div>
                            <div class="list-group list-group-flush" id="notification-list">
                                <div class="list-group-item list-group-item-action p-3">
                                    <div class="small text-muted">Vừa xong</div>
                                    <div class="fw-medium">Hệ thống đã sẵn sàng</div>
                                </div>
                            </div>
                            <div class="p-2 text-center border-top">
                                <a href="#" class="small text-decoration-none">Xem tất cả</a>
                            </div>
                        </div>
                    </div>

                    <!-- User Profile -->
                    <div class="dropdown">
                        <button class="btn btn-light border-0 d-flex align-items-center gap-2 rounded-pill px-3" type="button" data-bs-toggle="dropdown">
                            <i class="fa-solid fa-circle-user text-primary fs-5"></i>
                            <span class="d-none d-sm-inline fw-medium">Tài khoản</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                            <li><a class="dropdown-item py-2" href="/"><i class="fa-solid fa-house me-2 text-muted"></i>Trang chủ Web</a></li>
                            <li><a class="dropdown-item py-2" href="#"><i class="fa-solid fa-user-gear me-2 text-muted"></i>Cài đặt cá nhân</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item py-2 text-danger" href="#" id="btn-logout"><i class="fa-solid fa-right-from-bracket me-2"></i>Đăng xuất</a></li>
                        </ul>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="admin-body p-4" id="admin-content">
                <!-- Content will be injected here -->
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <div class="mt-2 text-muted">Đang tải dữ liệu...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Core Scripts -->
    <script type="module" src="/src/js/libs/utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App Logic -->
    <script type="module" src="./js/admin_app.js"></script>
</body>

</html>
